<!DOCTYPE html>
<html>
<head>
  <title>Ativação</title>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      background: #0d0d0d;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }
    .box {
      background: #1a1a1a;
      padding: 40px;
      border-radius: 15px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 25px rgba(255, 0, 0, 0.6);
    }
    h2 { color: #ff0000; margin-bottom: 20px; }
    input, button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-bottom: 15px;
      font-size: 14px;
    }
    input { background: #262626; color: white; }
    button {
      background: #ff0000;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover { background: #cc0000; }
    #msg { margin-top: 15px; min-height: 18px; font-size: 14px; }
  </style>
</head>
<body>

<div class="box">
  <h2>ATIVAR KEY</h2>
  <input type="text" id="keyInput" placeholder="Digite sua key">
  <button onclick="verificar()">Ativar</button>
  <div id="msg"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCZskqB6BDWZd5dOn7H7vXYcBM4wGFEjp4",
  authDomain: "login-71251.firebaseapp.com",
  projectId: "login-71251",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function getDeviceId() {
  let id = localStorage.getItem("deviceId");
  if (!id) {
    id = "dev-" + Math.random().toString(36).substring(2, 15);
    localStorage.setItem("deviceId", id);
  }
  return id;
}

const deviceId = getDeviceId();

const savedKey = localStorage.getItem("savedKey");
if (savedKey) {
  document.getElementById("keyInput").value = savedKey;
  verificar(true);
}

function verificar(auto=false) {
  const keyDigitada = document.getElementById("keyInput").value.trim().toUpperCase();
  const msg = document.getElementById("msg");

  if (!keyDigitada) {
    msg.style.color = "#ff0000";
    msg.innerHTML = "Digite uma key!";
    return;
  }

  db.collection("chaves")
    .where("key", "==", keyDigitada)
    .get()
    .then(snapshot => {
      if (snapshot.empty) {
        msg.style.color = "#ff0000";
        msg.innerHTML = "Key inválida!";
        return;
      }

      snapshot.forEach(doc => {
        const data = doc.data();

        if (data.dataAtivacao) {
          const ativ = data.dataAtivacao.toDate();
          const agora = new Date();
          const expira = new Date(ativ.getTime() + data.dias * 24 * 60 * 60 * 1000);
          if (agora > expira) {
            msg.style.color = "#ff0000";
            msg.innerHTML = "Key expirada!";
            localStorage.removeItem("savedKey");
            return;
          }
        }

        if (data.device && data.device !== deviceId) {
          msg.style.color = "#ff0000";
          msg.innerHTML = "Key já usada em outro dispositivo!";
          return;
        }

        if (!data.ativa) {
          db.collection("chaves").doc(doc.id).update({
            ativa: true,
            device: deviceId,
            dataAtivacao: firebase.firestore.FieldValue.serverTimestamp()
          });
        }

        localStorage.setItem("savedKey", keyDigitada);

        msg.style.color = "#00ff00";
        msg.innerHTML = "Acesso liberado!";

        // 🔹 Redireciona para home.html
        setTimeout(() => {
          window.location.href = "home.html";
        }, 1000);

        // 🔹 Para Sketchware / WebView
        if (window.Android && Android.loginSuccess) {
          Android.loginSuccess(); // callback nativo se necessário
        }
      });
    })
    .catch(error => {
      msg.style.color = "#ff0000";
      msg.innerHTML = error.message;
    });
}
</script>

</body>
</html>
