<!DOCTYPE html>
<html>
<head>
  <title>Ativação</title>
  <link rel="stylesheet" href="style.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="box">
  <h2>ATIVAR KEY</h2>
  <input type="text" id="keyInput" placeholder="Digite sua key">
  <button onclick="verificar()">Ativar</button>
  <div id="msg"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCZskqB6BDWZd5dOn7H7vXYcBM4wGFEjp4",
  authDomain: "login-71251.firebaseapp.com",
  projectId: "login-71251",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Gerar ID único do dispositivo
function getDeviceId() {
  let id = localStorage.getItem("deviceId");
  if (!id) {
    id = "dev-" + Math.random().toString(36).substring(2, 15);
    localStorage.setItem("deviceId", id);
  }
  return id;
}

const deviceId = getDeviceId();

// Auto login se já existe key salva
const savedKey = localStorage.getItem("savedKey");
if (savedKey) {
  document.getElementById("keyInput").value = savedKey;
  verificar(true);
}

function verificar(auto = false) {
  const keyDigitada = document.getElementById("keyInput").value.trim().toUpperCase();
  const msg = document.getElementById("msg");

  if (!keyDigitada) {
    msg.style.color = "#ff0000";
    msg.innerHTML = "Digite uma key!";
    return;
  }

  db.collection("chaves")
    .where("key", "==", keyDigitada)
    .get()
    .then(snapshot => {
      if (snapshot.empty) {
        msg.style.color = "#ff0000";
        msg.innerHTML = "Key inválida!";
        return;
      }

      snapshot.forEach(doc => {
        const data = doc.data();

        if (data.dataAtivacao) {
          const ativ = data.dataAtivacao.toDate();
          const agora = new Date();
          const expira = new Date(ativ.getTime() + data.dias * 24 * 60 * 60 * 1000);
          if (agora > expira) {
            msg.style.color = "#ff0000";
            msg.innerHTML = "Key expirada!";
            localStorage.removeItem("savedKey");
            return;
          }
        }

        if (data.device && data.device !== deviceId) {
          msg.style.color = "#ff0000";
          msg.innerHTML = "Key já usada em outro dispositivo!";
          return;
        }

        if (!data.ativa) {
          db.collection("chaves").doc(doc.id).update({
            ativa: true,
            device: deviceId,
            dataAtivacao: firebase.firestore.FieldValue.serverTimestamp()
          });
        }

        localStorage.setItem("savedKey", keyDigitada);
        msg.style.color = "#00ff00";
        msg.innerHTML = "Acesso liberado!";

        setTimeout(() => {
          window.location.href = "home.html";
        }, 1500);
      });

    }).catch(error => {
      msg.style.color = "#ff0000";
      msg.innerHTML = error.message;
    });
}
</script>
</body>
</html>
